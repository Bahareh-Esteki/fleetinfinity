<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" style="background-color: #f8fafc; border-radius: 8px;">
    <style>
        .core {
            fill: #A9C0D1; /* brand-light-blue for the old system */
            stroke: #475569;
            stroke-width: 4;
        }
        .patch {
            fill: #475569; /* A darker, clunky color */
            opacity: 0;
        }
        .data-spark {
            stroke: #A9C0D1;
            stroke-width: 2;
            stroke-dasharray: 10 15;
            stroke-dashoffset: 25;
            opacity: 0;
        }

        #legacy-system {
            animation: sag 10s infinite ease-in-out;
        }

        #patch1 { animation: add-patch1 10s infinite ease-out; }
        #patch2 { animation: add-patch2 10s infinite ease-out; }
        #patch3 { animation: add-patch3 10s infinite ease-out; }
        #patch4 { animation: add-patch4 10s infinite ease-out; }
        #patch5 { animation: add-patch5 10s infinite ease-out; }
        .data-spark { animation: data-burst 10s infinite ease-out; }

        @keyframes sag {
            0%, 50% { transform: translateY(0); }
            90%, 100% { transform: translateY(5px); }
        }

        @keyframes add-patch1 {
            0%, 20% { opacity: 0; transform: translate(-100px, -50px); }
            30%, 100% { opacity: 1; transform: translate(0, 0); }
        }
        @keyframes add-patch2 {
            0%, 25% { opacity: 0; transform: translate(100px, 0); }
            35%, 100% { opacity: 1; transform: translate(0, 0); }
        }
        @keyframes add-patch3 {
            0%, 30% { opacity: 0; transform: translate(0, 100px); }
            40%, 100% { opacity: 1; transform: translate(0, 0); }
        }
        @keyframes add-patch4 {
            0%, 35% { opacity: 0; transform: translate(100px, -100px); }
            45%, 100% { opacity: 1; transform: translate(0, 0); }
        }
         @keyframes add-patch5 {
            0%, 40% { opacity: 0; transform: translate(-100px, 100px); }
            50%, 100% { opacity: 1; transform: translate(0, 0); }
        }

        @keyframes data-burst {
            0%, 55% { opacity: 0; stroke-dashoffset: 25; }
            65% { opacity: 0.7; stroke-dashoffset: -150; }
            80%, 100% { opacity: 0; stroke-dashoffset: -150; }
        }
    </style>

    <g id="legacy-system" transform="translate(150, 125)">
        <!-- Core System -->
        <rect class="core" x="0" y="0" width="300" height="150" rx="5"/>

        <!-- Patches and Features -->
        <rect id="patch1" class="patch" x="-50" y="20" width="50" height="70" rx="3"/>
        <rect id="patch2" class="patch" x="300" y="50" width="60" height="40" rx="3"/>
        <rect id="patch3" class="patch" x="70" y="150" width="160" height="30" rx="3"/>
        <rect id="patch4" class="patch" x="240" y="-40" width="80" height="40" rx="3"/>
        <rect id="patch5" class="patch" x="-20" y="110" width="70" height="60" rx="3"/>
        
        <!-- Data Overload Sparks -->
        <g>
            <line class="data-spark" x1="150" y1="75" x2="-50" y2="-25" />
            <line class="data-spark" x1="150" y1="75" x2="350" y2="-25" />
            <line class="data-spark" x1="150" y1="75" x2="400" y2="75" />
            <line class="data-spark" x1="150" y1="75" x2="350" y2="175" />
            <line class="data-spark" x1="150" y1="75" x2="150" y2="225" />
            <line class="data-spark" x1="150" y1="75" x2="-50" y2="175" />
            <line class="data-spark" x1="150" y1="75" x2="-100" y2="75" />
        </g>
    </g>
</svg>
